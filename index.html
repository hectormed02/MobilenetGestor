<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso | MobileNet Solutions SRL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input { 
            background-color: #1e293b !important; 
            border: 2px solid #334155 !important; 
            color: white !important; 
        }
        input:focus { border-color: #10b981 !important; outline: none; }
        .btn-submit {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-black text-emerald-500 tracking-tighter uppercase">MobileNet</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em] mt-1">Solutions SRL</p>
        </div>

        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl">
            <form id="formIngreso" class="space-y-8 text-center">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Identificación de Personal</label>
                    <input type="number" id="dni" required placeholder="DNI" 
                        class="w-full p-6 text-4xl text-center rounded-3xl font-mono tracking-widest transition-all">
                </div>

                <button type="submit" id="btnSubmit" 
                    class="w-full py-6 btn-submit text-white font-black text-xl rounded-3xl active:scale-95 transition-transform uppercase">
                    Marcar Ingreso
                </button>
            </form>
            
            <div id="status" class="mt-8 p-4 rounded-2xl text-center hidden font-bold text-sm"></div>
        </div>
        
        <div class="text-center space-y-2">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Entrada Oficial: 09:00 AM (Tol. 5 min)</p>
            <p class="text-slate-700 text-[9px] uppercase tracking-widest">© 2026 MobileNet Solutions SRL</p>
        </div>
    </div>

    <script>
        // Tu URL de Apps Script proporcionada
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwBAnelD4D_pvmWGXc9fLfqlSX2HzZYCfdkghp-5focrJTdiSHfmD2wTO2xdQj-apr/exec"; 

        document.getElementById('formIngreso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('status');
            const dniInput = document.getElementById('dni');
            
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            status.classList.add('hidden');

            try {
                // Envío mediante POST
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ dni: dniInput.value })
                });

                // Éxito (Apps Script recibe no-cors sin devolver JSON legible al cliente)
                status.innerText = "REGISTRO EXITOSO";
                status.className = "mt-8 p-4 rounded-2xl text-center bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 block";
                dniInput.value = "";

            } catch (err) {
                status.innerText = "ERROR DE CONEXIÓN";
                status.className = "mt-8 p-4 rounded-2xl text-center bg-red-500/10 text-red-400 border border-red-500/20 block";
            } finally {
                btn.disabled = false;
                btn.innerText = "MARCAR INGRESO";
                
                // Limpiar mensaje después de 5 segundos
                setTimeout(() => { status.classList.add('hidden'); }, 5000);
            }
        });
    </script>
</body>
</html>
