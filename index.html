<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia MobileNet</title>
    <style>
        :root { --bg: #f0f4f8; --card: #fff; --text: #333; --blue: #0056b3; --light-blue: #e0f0ff; --border: #ccc; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #fff; --blue: #4da3ff; --light-blue: #003366; --border: #444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        h2 { text-align: center; color: var(--blue); margin: 0; }
        .clock { font-size: 1.8rem; text-align: center; font-weight: bold; margin: 15px 0; color: var(--blue); background: var(--light-blue); padding: 10px; border-radius: 8px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; background: var(--card); color: var(--text); }
        input[readonly] { background: var(--bg); opacity: 0.8; }
        .camera-box { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        button.main { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loader { display: none; text-align: center; color: var(--blue); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='dark'?'light':'dark')" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
            <h2>MobileNet</h2>
            <button style="background:none; border:none; cursor:pointer; font-size:1.2rem;">⚙️</button>
        </div>

        <div class="clock" id="reloj">00:00:00</div>

        <div class="form-group">
            <label>DNI / CE:</label>
            <input type="number" id="dni" placeholder="Cargando base de datos..." disabled onkeyup="buscar()">
        </div>

        <div class="form-group">
            <label>Asesor:</label>
            <input type="text" id="asesor" readonly placeholder="Esperando identificación...">
        </div>

        <div class="form-group">
            <label>Motivo:</label>
            <select id="motivo">
                <option value="Ingreso">Ingreso</option>
                <option value="Salida Almuerzo">Salida Almuerzo</option>
                <option value="Retorno Almuerzo">Retorno Almuerzo</option>
                <option value="Salida">Salida</option>
            </select>
        </div>

        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
        </div>

        <button class="main" id="btn" onclick="enviar()" disabled>Registrar Asistencia</button>
        <div class="loader" id="loading">Enviando a Google Drive...</div>
    </div>

    <script>
        const GAS_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; 
        let db = [];
        let usuario = null;

        window.onload = async () => {
            setInterval(() => {
                document.getElementById("reloj").textContent = new Date().toLocaleTimeString('es-PE');
            }, 1000);

            // Iniciar Cámara
            const v = document.getElementById('video');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
            } catch (e) { alert("Acceso a cámara denegado."); }

            // Cargar base de datos (Col A y Col B)
            try {
                const r = await fetch(GAS_URL);
                const res = await r.json();
                if (res.status === "success") {
                    db = res.data;
                    document.getElementById("dni").disabled = false;
                    document.getElementById("dni").placeholder = "Ingrese su DNI";
                }
            } catch (e) { document.getElementById("dni").placeholder = "Error de conexión"; }
        };

        function buscar() {
            const val = document.getElementById("dni").value;
            const res = db.find(u => u.dni === val);
            if (res) {
                usuario = res;
                document.getElementById("asesor").value = res.asesor;
                document.getElementById("btn").disabled = false;
            } else {
                usuario = null;
                document.getElementById("asesor").value = val ? "No registrado" : "";
                document.getElementById("btn").disabled = true;
            }
        }

        async function enviar() {
            const btn = document.getElementById("btn");
            const load = document.getElementById("loading");
            btn.style.display = "none";
            load.style.display = "block";

            // Captura foto
            const canvas = document.createElement('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const img = canvas.toDataURL('image/webp', 0.7);

            const now = new Date();
            const tardanza = (document.getElementById("motivo").value === "Ingreso" && (now.getHours() > 9 || (now.getHours() === 9 && now.getMinutes() > 5))) 
                ? (Math.floor((now - new Date().setHours(9,0,0,0))/60000)) : 0;

            const payload = {
                dni: usuario.dni,
                asesor: usuario.asesor,
                supervisor: usuario.supervisor,
                area: usuario.area,
                motivo: document.getElementById("motivo").value,
                hora: now.toLocaleTimeString('es-PE'),
                fecha: now.toLocaleDateString('es-PE'),
                mes: now.toLocaleString('es-PE', { month: 'long' }),
                anio: now.getFullYear(),
                tardanza: tardanza,
                image: img
            };

            try {
                const r = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const res = await r.json();
                if (res.status === "success") {
                    alert("¡Asistencia registrada!");
                    location.reload();
                }
            } catch (e) { alert("Error al enviar."); btn.style.display = "block"; load.style.display = "none"; }
        }
    </script>
</body>
</html>
