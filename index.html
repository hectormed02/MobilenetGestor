<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Marcación | Padilla Deportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: white; }
        .card { background-color: #1f2937; border: 1px solid #374151; }
        input, select, textarea { background-color: #374151 !important; border: 1px solid #4b5563 !important; color: white !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">PADILLA DEPORTES</h1>
            <p class="text-gray-400">Control de Asistencia</p>
        </div>

        <div class="card p-8 rounded-2xl shadow-2xl">
            <form id="checkInForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Ingrese su DNI</label>
                    <input type="number" id="dni" required placeholder="Ej: 70654321" 
                        class="w-full p-4 text-2xl text-center rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Motivo de Marcación</label>
                    <select id="motivo" required class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="INGRESO">ENTRADA (09:00 AM)</option>
                        <option value="REFRIGERIO_SALIDA">SALIDA REFRIGERIO</option>
                        <option value="REFRIGERIO_RETORNO">RETORNO REFRIGERIO</option>
                        <option value="SALIDA">SALIDA FINAL</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Observaciones (Opcional)</label>
                    <textarea id="observaciones" rows="2" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <button type="submit" id="btnSubmit" 
                    class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg rounded-xl transition-all active:scale-95">
                    MARCAR ASISTENCIA
                </button>
            </form>
            <div id="statusMessage" class="mt-4 text-center hidden"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

        document.getElementById('checkInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('statusMessage');
            
            btn.disabled = true;
            btn.innerText = "Procesando...";
            status.classList.add('hidden');

            const payload = {
                dni: document.getElementById('dni').value,
                motivo: document.getElementById('motivo').value,
                observaciones: document.getElementById('observaciones').value
            };

            try {
                // Usamos POST para enviar el DNI
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Como es 'no-cors', no podemos leer la respuesta, pero si no hay error en el catch, se envió.
                status.innerText = "✅ ¡Marcación enviada con éxito!";
                status.className = "mt-4 text-center text-green-400 font-bold";
                status.classList.remove('hidden');
                
                document.getElementById('dni').value = "";
                document.getElementById('observaciones').value = "";

            } catch (err) {
                status.innerText = "❌ Error de conexión";
                status.className = "mt-4 text-center text-red-400 font-bold";
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "MARCAR ASISTENCIA";
            }
        });
    </script>
</body>
</html>
