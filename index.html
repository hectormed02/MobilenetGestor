<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia | MobileNet Entel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f7f9; font-family: sans-serif; }
        .entel-blue { background-color: #0033A0; }
        .entel-celeste { background-color: #8ED8F0; } /* El color de tu botón en la imagen */
        .btn-celeste { background-color: #8ED8F0; color: white; font-weight: 800; border-radius: 1rem; }
        .input-style { border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1.2rem; text-align: center; font-size: 1.875rem; font-weight: 700; color: #4b5563; }
        .label-style { font-size: 0.65rem; font-weight: 900; color: #9ca3af; text-transform: uppercase; margin-left: 0.5rem; margin-bottom: 0.5rem; display: block; }
        video { transform: scaleX(-1); border-radius: 1rem; }
        .card-main { border-radius: 2rem; border-top: 5px solid #00A9E0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-6">
            <div class="inline-block entel-blue px-6 py-4 rounded-2xl shadow-lg mb-2">
                <h1 class="text-white font-black text-3xl italic tracking-tighter">entel</h1>
            </div>
            <p class="text-slate-500 font-bold text-[10px] uppercase tracking-widest">MobileNet Solutions SRL</p>
        </div>

        <div class="bg-white card-main shadow-2xl p-8 space-y-6">
            <form id="formAsis" class="space-y-5">
                
                <div>
                    <label class="label-style">Documento de Identidad</label>
                    <input type="number" id="dni" required placeholder="Ingrese DNI" class="w-full input-style outline-none focus:border-blue-300">
                </div>

                <div id="nombreWrap" class="hidden text-center py-2">
                    <p id="nombreAsesor" class="text-[#0033A0] font-black text-lg uppercase"></p>
                </div>

                <div>
                    <label class="label-style">Evidencia Fotográfica</label>
                    <div class="relative aspect-[16/10] bg-black rounded-2xl overflow-hidden mb-3">
                        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                        <img id="preview" class="hidden absolute inset-0 w-full h-full object-cover">
                    </div>
                    <button type="button" id="snap" class="w-full py-3 bg-[#4b5a76] text-white font-bold rounded-xl text-[0.7rem] uppercase tracking-widest">Capturar Foto</button>
                </div>

                <div>
                    <label class="label-style">Motivo</label>
                    <select id="motivo" class="w-full p-4 border rounded-2xl font-bold text-slate-700 outline-none appearance-none cursor-pointer">
                        <option value="INGRESO DIARIO">INGRESO DIARIO</option>
                        <option value="CITA CON CLIENTE">CITA CON CLIENTE</option>
                        <option value="PERMISO CON SUPERVISOR">PERMISO CON SUPERVISOR</option>
                    </select>
                </div>

                <input type="text" id="obs" placeholder="Observaciones..." class="w-full p-4 border rounded-2xl text-sm outline-none">

                <button type="submit" id="btnSubmit" disabled
                    class="w-full py-5 btn-celeste opacity-50 cursor-not-allowed shadow-lg uppercase tracking-wider text-xl">
                    Registrar Asistencia
                </button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTdfWqQJq_S5RXQCoK94A918Z3WGkCIDRbwecnsurOmbbWiwQCvVjGM9Cum_C62n4Ung/exec";
        let asesores = [], foto = "";
        const v = document.getElementById('video'), d = document.getElementById('dni'), n = document.getElementById('nombreAsesor'), w = document.getElementById('nombreWrap'), btn = document.getElementById('btnSubmit');

        // Cámara y Data
        navigator.mediaDevices.getUserMedia({video: {facingMode:"user"}}).then(s => v.srcObject = s);
        fetch(SCRIPT_URL).then(r => r.json()).then(data => asesores = data);

        // Búsqueda instantánea
        d.oninput = () => {
            const user = asesores.find(a => a.dni === d.value);
            if (user) {
                n.innerText = user.nombre;
                w.classList.remove('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                w.classList.add('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        };

        // Captura
        document.getElementById('snap').onclick = () => {
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            foto = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('preview').src = foto;
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('snap').innerText = "VOLVER A CAPTURAR";
        };

        // Registro
        document.getElementById('formAsis').onsubmit = async (e) => {
            e.preventDefault();
            if(!foto) return alert("Captura tu foto.");
            btn.innerText = "REGISTRANDO..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        dni: d.value,
                        motivo: document.getElementById('motivo').value,
                        obs: document.getElementById('obs').value,
                        foto: foto
                    })
                });
                alert("Registro exitoso.");
                location.reload();
            } catch (err) {
                alert("Error de conexión.");
                btn.innerText = "REGISTRAR ASISTENCIA"; btn.disabled = false;
            }
        };
    </script>
</body>
</html>
