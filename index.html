<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia | Padilla Deportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #2563eb;
            --dark-bg: #111827;
        }
        body { background-color: #f3f4f6; }
        .dark-mode { background-color: var(--dark-bg); color: white; }
        .dark-mode .card { background-color: #1f2937; border-color: #374151; }
        .dark-mode input, .dark-mode select { background-color: #374151; border-color: #4b5563; color: white; }
    </style>
</head>
<body class="transition-colors duration-300">

    <div class="max-w-md mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-blue-600">Registro de Asistencia</h1>
            <button onclick="toggleTheme()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <div class="card bg-white p-6 rounded-xl shadow-lg border border-gray-200">
            <form id="attendanceForm" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium mb-1">Asesor (Activos)</label>
                    <select id="asesor" required class="w-full p-2 rounded border focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Seleccione un asesor...</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">DNI</label>
                        <input type="text" id="dni" readonly class="w-full p-2 bg-gray-100 rounded border text-gray-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Área</label>
                        <input type="text" id="area" readonly class="w-full p-2 bg-gray-100 rounded border text-gray-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Supervisor</label>
                    <input type="text" id="supervisor" readonly class="w-full p-2 bg-gray-100 rounded border text-gray-500">
                </div>

                <hr class="my-4 border-gray-200">

                <div>
                    <label class="block text-sm font-medium mb-1">Motivo</label>
                    <select id="motivo" required class="w-full p-2 rounded border">
                        <option value="INGRESO">INGRESO</option>
                        <option value="REFRIGERIO">REFRIGERIO</option>
                        <option value="SALIDA">SALIDA</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Horario</label>
                        <input type="time" id="horario" required class="w-full p-2 rounded border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Tardanza (min)</label>
                        <input type="number" id="tardanza" value="0" class="w-full p-2 rounded border">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Observaciones</label>
                    <textarea id="observaciones" rows="2" class="w-full p-2 rounded border"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium">Foto de Evidencia</label>
                    <video id="video" class="w-full rounded bg-black" autoplay playsinline></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <button type="button" onclick="takeSnapshot()" id="snapBtn" class="w-full py-2 bg-gray-600 text-white rounded hover:bg-gray-700">
                        📸 Capturar Foto
                    </button>
                    <img id="photoPreview" class="hidden w-full rounded border-2 border-green-500">
                </div>

                <button type="submit" id="submitBtn" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-transform active:scale-95">
                    REGISTRAR ASISTENCIA
                </button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwBAnelD4D_pvmWGXc9fLfqlSX2HzZYCfdkghp-5focrJTdiSHfmD2wTO2xdQj-apr/exec"; // REEMPLAZA ESTO
        let listaAsesores = [];
        let fotoBase64 = "";

        // Inicializar cámara
        const video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
        });

        function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            fotoBase64 = canvas.toDataURL('image/jpeg');
            const preview = document.getElementById('photoPreview');
            preview.src = fotoBase64;
            preview.classList.remove('hidden');
            video.classList.add('hidden');
            document.getElementById('snapBtn').innerText = "🔄 Re-tomar Foto";
        }

        // Cargar Asesores desde la hoja
        async function cargarData() {
            try {
                const res = await fetch(SCRIPT_URL);
                listaAsesores = await res.json();
                const select = document.getElementById('asesor');
                listaAsesores.forEach(as => {
                    let opt = document.createElement('option');
                    opt.value = as.nombre;
                    opt.text = as.nombre;
                    select.add(opt);
                });
            } catch (e) { console.error("Error cargando asesores", e); }
        }

        // Auto-completar campos
        document.getElementById('asesor').addEventListener('change', (e) => {
            const as = listaAsesores.find(item => item.nombre === e.target.value);
            if (as) {
                document.getElementById('dni').value = as.dni;
                document.getElementById('supervisor').value = as.supervisor;
                document.getElementById('area').value = as.area;
            }
        });

        // Enviar Formulario
        document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const payload = {
                asesor: document.getElementById('asesor').value,
                dni: document.getElementById('dni').value,
                supervisor: document.getElementById('supervisor').value,
                area: document.getElementById('area').value,
                motivo: document.getElementById('motivo').value,
                horario: document.getElementById('horario').value,
                tardanza: document.getElementById('tardanza').value,
                observaciones: document.getElementById('observaciones').value,
                driveLink: fotoBase64 // Se enviará la cadena base64 para procesar en Apps Script
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert("✅ Registro guardado con éxito");
                location.reload();
            } catch (err) {
                alert("❌ Error al enviar");
                btn.disabled = false;
                btn.innerText = "REGISTRAR ASISTENCIA";
            }
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            icon.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        window.onload = cargarData;
    </script>
</body>
</html>
