<body class="flex items-center justify-center min-h-screen p-6 bg-slate-100">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-[#00A9E0]">
        <h1 class="text-[#0033A0] font-black text-2xl text-center mb-6 italic uppercase">MobileNet Entel</h1>
        
        <form id="formAsistencia" class="space-y-4">
            <input type="number" id="dni" required placeholder="DNI" class="w-full p-4 border-2 rounded-xl text-center text-xl font-bold">
            
            <div id="wrapperAsesor" class="hidden text-center p-2 bg-blue-50 rounded-lg">
                <p id="nombreAsesor" class="text-[#0033A0] font-bold uppercase"></p>
            </div>

            <div class="relative overflow-hidden rounded-xl bg-black aspect-video mb-2">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="preview" class="hidden w-full h-full object-cover absolute top-0 left-0">
            </div>
            
            <button type="button" id="snap" class="w-full py-2 bg-slate-600 text-white font-bold rounded-lg text-xs uppercase">Capturar Foto Evidencia</button>

            <select id="motivo" required class="w-full p-4 border-2 rounded-xl font-bold">
                <option value="INGRESO">INGRESO DIARIO</option>
                <option value="CITA CON CLIENTE">CITA CON CLIENTE</option>
                <option value="PERMISO CON SUPERVISOR">PERMISO CON SUPERVISOR</option>
                <option value="OTROS">OTROS</option>
            </select>

            <textarea id="observaciones" placeholder="Observaciones..." class="w-full p-3 border-2 rounded-xl text-sm"></textarea>

            <button type="submit" id="btnSubmit" disabled class="w-full py-5 bg-[#00A9E0] text-white font-black rounded-2xl opacity-50">REGISTRAR</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT";
        let fotoData = "";
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const preview = document.getElementById('preview');

        // Activar Cámara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; });

        document.getElementById('snap').addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            fotoData = canvas.toDataURL('image/jpeg');
            preview.src = fotoData;
            preview.classList.remove('hidden');
            document.getElementById('snap').innerText = "VOLVER A TOMAR FOTO";
        });

        // Búsqueda de DNI y habilitar botón
        document.getElementById('dni').addEventListener('input', async (e) => {
            if(e.target.value.length === 8) {
                const r = await fetch(`${SCRIPT_URL}?dni=${e.target.value}`);
                const d = await r.json();
                if(d.success) {
                    document.getElementById('nombreAsesor').innerText = d.nombre;
                    document.getElementById('wrapperAsesor').classList.remove('hidden');
                    document.getElementById('btnSubmit').disabled = false;
                    document.getElementById('btnSubmit').classList.remove('opacity-50');
                }
            }
        });

        document.getElementById('formAsistencia').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!fotoData) return alert("Debes tomar una foto");
            
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    dni: document.getElementById('dni').value,
                    motivo: document.getElementById('motivo').value,
                    observaciones: document.getElementById('observaciones').value,
                    foto: fotoData
                })
            });

            alert("Registro Exitoso");
            location.reload();
        });
    </script>
</body>
