<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entel | MobileNet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex justify-center min-h-screen items-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-t-8 border-[#00A9E0]">
        <div class="bg-[#0033A0] p-4 text-center">
            <h1 class="text-white font-black italic text-2xl italic">entel</h1>
        </div>
        
        <form id="f" class="p-6 space-y-4">
            <input type="number" id="d" placeholder="DNI" required class="w-full p-4 text-2xl text-center border-2 rounded-2xl font-bold outline-none focus:border-[#00A9E0]">
            
            <div id="w" class="hidden p-3 bg-blue-50 rounded-xl border-l-4 border-[#0033A0] text-center font-bold text-[#0033A0] uppercase text-sm"></div>

            <div class="relative rounded-xl overflow-hidden bg-black aspect-video">
                <video id="v" autoplay playsinline class="w-full h-full object-cover"></video>
                <img id="p" class="hidden absolute inset-0 w-full h-full object-cover">
            </div>
            
            <button type="button" id="s" class="w-full py-2 bg-slate-600 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest">Tomar Foto</button>

            <select id="m" class="w-full p-4 border-2 rounded-2xl font-bold outline-none">
                <option value="INGRESO">INGRESO DIARIO</option>
                <option value="CITA CON CLIENTE">CITA CON CLIENTE</option>
                <option value="PERMISO CON SUPERVISOR">PERMISO CON SUPERVISOR</option>
            </select>

            <button type="submit" id="go" disabled class="w-full py-5 bg-[#00A9E0] text-white font-black rounded-2xl opacity-50 uppercase tracking-widest transition-all">Registrar</button>
        </form>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwTdfWqQJq_S5RXQCoK94A918Z3WGkCIDRbwecnsurOmbbWiwQCvVjGM9Cum_C62n4Ung/exec";
        let db = [], foto = "";
        const v = document.getElementById('v'), d = document.getElementById('d'), w = document.getElementById('w'), go = document.getElementById('go');

        // 1. Carga inmediata de cámara y base de datos
        navigator.mediaDevices.getUserMedia({video: {facingMode:"user"}}).then(s => v.srcObject = s);
        fetch(URL).then(r => r.json()).then(data => db = data);

        // 2. Búsqueda local (0ms de espera)
        d.oninput = () => {
            const u = db.find(x => x.dni === d.value);
            if (u) {
                w.innerText = u.nombre;
                w.classList.remove('hidden');
                go.disabled = false;
                go.classList.remove('opacity-50');
            } else {
                w.classList.add('hidden');
                go.disabled = true;
                go.classList.add('opacity-50');
            }
        };

        // 3. Foto rápida
        document.getElementById('s').onclick = () => {
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            foto = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('p').src = foto;
            document.getElementById('p').classList.remove('hidden');
        };

        // 4. Envío
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            if(!foto) return alert("Falta foto");
            go.innerText = "REGISTRANDO..."; go.disabled = true;
            await fetch(URL, {method:'POST', mode:'no-cors', body: JSON.stringify({dni: d.value, motivo: document.getElementById('m').value, foto: foto})});
            alert("Listo"); location.reload();
        };
    </script>
</body>
</html>
